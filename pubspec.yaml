name: benkyo
description: "Benkyo - A peer-to-peer study platform for college students."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.2
  percent_indicator: ^4.2.3
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
